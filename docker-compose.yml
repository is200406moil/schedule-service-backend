name: student-tasks-backend

services:
  app:
    build:
      context: .
    container_name: student_tasks_app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://user:password@db:5432/student_tasks
      SECRET_KEY: ${SECRET_KEY:-change-me-in-development}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  db:
    image: postgres:16-alpine
    container_name: student_tasks_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: student_tasks
    ports:
      - "15432:5432"
    volumes:
      - student_tasks_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d student_tasks"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  student_tasks_pgdata:
