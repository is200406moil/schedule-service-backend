{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<h1>Регистрация</h1>
{% if error == "exists" %}
<p class="err">Такой email уже зарегистрирован.</p>
{% elif error == "short" %}
<p class="err">Пароль не короче 8 символов.</p>
{% endif %}
<form method="post" action="/ui/register" class="stack" enctype="multipart/form-data">
  <label>Email<br><input type="email" name="email" required autocomplete="username"></label>
  <label>Пароль (мин. 8 символов)<br><input type="password" name="password" required autocomplete="new-password" minlength="8"></label>
  <label>Фамилия<br><input type="text" name="last_name" maxlength="120"></label>
  <label>Имя<br><input type="text" name="first_name" maxlength="120"></label>
  <label>Отчество<br><input type="text" name="patronymic" maxlength="120"></label>
  <label>Дата рождения<br><input type="date" name="birth_date"></label>
  <label>Группа
    <div class="autocomplete" data-autocomplete="groups" data-placeholder="ИКБО-14-23">
      <input type="text" name="group_name" maxlength="64" placeholder="ИКБО-14-23" autocomplete="off">
      <div class="autocomplete-list"></div>
    </div>
  </label>
  <label>Аватар
    <input type="file" name="avatar_file" accept="image/*">
  </label>
  <button type="submit">Создать аккаунт</button>
</form>
<p class="hint">Уже есть аккаунт? <a href="/ui/login">Вход</a></p>

<script>
  const GROUPS_API = "http://{{ domain }}:5000/api/schedule/groups";

  function normalizeKey(value) {
    return (value || "")
      .toLowerCase()
      .replace(/[^a-z0-9а-яё]+/gi, "");
  }

  function initAutocomplete(root, source, onPick) {
    const input = root.querySelector("input");
    const list = root.querySelector(".autocomplete-list");
    let items = source || [];

    function render(filtered) {
      list.innerHTML = "";
      if (!filtered.length) {
        list.classList.remove("open");
        return;
      }
      filtered.slice(0, 8).forEach((value) => {
        const option = document.createElement("button");
        option.type = "button";
        option.className = "autocomplete-item";
        option.textContent = value;
        option.addEventListener("click", () => {
          input.value = value;
          list.classList.remove("open");
          if (onPick) onPick(value);
        });
        list.appendChild(option);
      });
      list.classList.add("open");
    }

    function filter() {
      const query = normalizeKey(input.value);
      if (!query) {
        render(items);
        return;
      }
      const filtered = items.filter((value) => normalizeKey(value).includes(query));
      render(filtered);
    }

    input.addEventListener("input", filter);
    input.addEventListener("focus", filter);
    document.addEventListener("click", (event) => {
      if (!root.contains(event.target)) {
        list.classList.remove("open");
      }
    });
  }

  async function loadGroups() {
    try {
      const resp = await fetch(GROUPS_API);
      if (!resp.ok) return [];
      const data = await resp.json();
      return Array.isArray(data) ? data : data.groups || [];
    } catch (err) {
      return [];
    }
  }

  loadGroups().then((groups) => {
    document.querySelectorAll('[data-autocomplete="groups"]').forEach((root) => {
      initAutocomplete(root, groups);
    });
  });
</script>
{% endblock %}
